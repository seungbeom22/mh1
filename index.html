<body>
    <div id="ui-container">
        <div id="left-ui"><span id="best-display"></span><br><span id="score-display"></span></div>
        <div id="center-ui"><button id="shop-btn">🛒</button></div>
        <div id="right-ui">
            <div id="heart-display"></div>
            <div id="coin-display"></div>
            <div id="armor-status" style="font-size:12px; color:blue;"></div>
        </div>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <div id="touch-area">이곳을 터치하여 점프</div>

    <div id="shop-modal" class="hidden">
        <button onclick="document.getElementById('shop-modal').classList.add('hidden')">⬅️ 뒤로 가기</button>
    </div>
</body>
