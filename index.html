<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>사막 고양이 러너</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container">
        <div id="left-ui">
            <span id="best-display">Best: 0</span><br>
            <span id="score-display">Score: 0</span>
        </div>
        
        <div id="center-ui">
            <button id="shop-btn">🛒</button>
        </div>

        <div id="right-ui">
            <div id="heart-display">❤️❤️❤️</div>
            <div id="coin-display">🪙 0</div>
        </div>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="shop-modal" class="hidden">
        <div class="shop-content">
            <h2>🌵 사막 상점</h2>
            <p>구매 즉시 효과가 적용됩니다!</p>
            <div class="shop-item">
                <span>🛡️ 무적 (3초)</span>
                <button onclick="buyItem('shield', 130)">130🪙</button>
            </div>
            <div class="shop-item">
                <span>❤️ 목숨 +1</span>
                <button onclick="buyItem('life', 200)">200🪙</button>
            </div>
            <div class="shop-item">
                <span>⏰ 슬로우 (10초)</span>
                <button onclick="buyItem('slow', 315)">315🪙</button>
            </div>
            <button id="close-shop">나가기</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
